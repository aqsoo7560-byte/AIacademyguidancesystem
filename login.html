<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
        }

        .container {
            background: rgb(74, 75, 139);
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: white; /* Text nazar aaye isliye white kiya */
        }

        .home-btn {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .home-btn:hover {
            color: #004d77;
            text-decoration: underline;
        }

        label {
            display: block;
            text-align: left;
            margin-left: 15px;
        }

        h1 { margin-bottom: 20px; }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            color: black; /* Input ke andar black text */
        }

        button {
            width: 95%;
            padding: 10px;
            background: #031529;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover { background: #0056cc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Login Form</h1>

    <form action="/login" method="POST">

        <label>Email</label>
        <input type="email" placeholder="Enter Email" name="email" required><br><br>

        <label>Password</label>
        <input type="password" placeholder="Enter password" name="password" required><br><br>

        <button type="submit">Login</button><br><br>

    </form>
    
    <a href="{{ url_for('home') }}" class="home-btn">← Back to Home</a>
</div>

</body>
</html>
