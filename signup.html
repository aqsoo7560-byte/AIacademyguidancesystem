<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
        }

        .container {
            background: linear-gradient(to right, #3774a9, #6855a5);
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            border: 3px solid #4facfe;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: white; /* Gradient par white zyada acha lagega */
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #0077ff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056cc;
        }

        .links {
            margin-top: 10px;
            font-size: 14px;
            color: white;
        }

        .links a, .home-btn {
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
        }

        .home-btn {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <form action="/signup" method="POST">

        <input type="text" name="fullname" placeholder="Full Name" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <input type="password" name="confirm" placeholder="Confirm Password" required>

        <button type="submit">Sign Up</button>

    </form>

    <div class="links">
        <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        <a href="{{ url_for('home') }}" class="home-btn">← Back to Home</a>
    </div>
</div>

</body>
</html>
